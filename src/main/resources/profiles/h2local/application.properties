# Spring MVC is used only for the H2 console and Actuator management context.
server.port=9000

# Vert.x HTTP and worker configuration
vertx.port=8989
vertx.worker.pool.size=6
vertx.springWorker.instances=4
vertx.max.eventloop.execute.time=10000
vertx.blocked.thread.check.interval=1000

# Intentional blocking latency used by the worker-thread search-index demo.
demo.reindex.item-delay-ms=150

# Actuator
management.server.port=7979
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,liquibase,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Vert.x Embedded Spring Boot Async Worker Pattern
info.app.description=Event-loop handoff and accepted background job reference implementation
info.app.version=0.8.0-SNAPSHOT

# H2, JPA, Liquibase, and MyBatis
spring.h2.console.enabled=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
mybatis.mapper-locations=classpath:mappers/**/*.xml

logging.level.org.springframework=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.hibernate=WARN
logging.level.liquibase=WARN
logging.level.com.zaxxer.hikari=WARN
# The local H2 demo performs no external DNS lookups; Netty can use the JDK fallback on macOS.
logging.level.io.netty.resolver.dns.DnsServerAddressStreamProviders=ERROR
logging.level.com.vertx.worker=INFO
