# Spring MVC hosts the Actuator management context.
server.port=9000

# Vert.x HTTP and worker configuration
vertx.port=8989
vertx.worker.pool.size=6
vertx.springWorker.instances=4
vertx.max.eventloop.execute.time=10000
vertx.blocked.thread.check.interval=1000

# Intentional blocking latency used by the worker-thread search-index demo.
demo.reindex.item-delay-ms=150

# Actuator
management.server.port=7979
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,liquibase,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Vert.x Embedded Spring Boot Async Worker Pattern
info.app.description=Event-loop handoff and accepted background job reference implementation
info.app.version=0.8.0-SNAPSHOT

# MariaDB, JPA, Liquibase, and MyBatis
spring.h2.console.enabled=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://YOUR_DB_IP:YOUR_DB_PORT/YOUR_DATABASE_NAME
spring.datasource.username=YOUR_USER_NAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.keepalive-time=600000
spring.datasource.hikari.connection-test-query=SELECT 1
mybatis.mapper-locations=classpath:mappers/**/*.xml

logging.level.org.springframework=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.hibernate=WARN
logging.level.liquibase=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.vertx.worker=INFO
